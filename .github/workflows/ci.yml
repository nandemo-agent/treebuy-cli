name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────
  # Job 1: install + basic smoke on Node 18 & 20
  # ──────────────────────────────────────
  test-cli:
    name: smoke (${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: --help
        run: node bin/treebuy-cli.js --help

      - name: schema (list all, JSON)
        run: |
          node bin/treebuy-cli.js schema \
            | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); if (!Array.isArray(d)) throw new Error('expected array');"

      - name: featured list --json (parse check)
        run: |
          node bin/treebuy-cli.js featured list --json \
            | node -e "const d=JSON.parse(require('fs').readFileSync(0,'utf8')); if (!Array.isArray(d)) throw new Error('expected array');"

      - name: search products --ndjson --limit 1 (parse first line)
        run: |
          node bin/treebuy-cli.js search products "Dyson" --ndjson --limit 1 \
            | head -n 1 \
            | node -e "JSON.parse(require('fs').readFileSync(0,'utf8'));"

  # ──────────────────────────────────────
  # Job 2: output contract checks (Node 20)
  # ──────────────────────────────────────
  contract-smoke:
    name: contract smoke
    runs-on: ubuntu-latest
    needs: test-cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: featured list --json → array
        run: |
          node bin/treebuy-cli.js featured list --json | node -e "
            const d = JSON.parse(require('fs').readFileSync(0,'utf8'));
            if (!Array.isArray(d)) throw new Error('featured --json must be an array');
            if (d.length === 0) { console.warn('WARN: empty array (ok if no live campaign)'); process.exit(0); }
            const c = d[0];
            if (!c.id || !c.kind) throw new Error('missing id or kind on campaign');
            if (!Array.isArray(c.products)) throw new Error('products must be array');
            console.log('ok: featured list --json contract passed, campaigns=' + d.length);
          "

      - name: search products --json → {hits, pagination}
        run: |
          node bin/treebuy-cli.js search products "Dyson" --json --limit 1 | node -e "
            const d = JSON.parse(require('fs').readFileSync(0,'utf8'));
            if (!Array.isArray(d.hits)) throw new Error('hits must be array');
            if (!d.pagination || typeof d.pagination.total_count !== 'number') throw new Error('missing pagination.total_count');
            console.log('ok: search --json contract passed, total=' + d.pagination.total_count);
          "

      - name: search products non-TTY → valid NDJSON lines
        run: |
          node bin/treebuy-cli.js search products "Dyson" --limit 3 | node -e "
            const lines = require('fs').readFileSync(0,'utf8').trim().split('\n');
            if (lines.length === 0) throw new Error('no output');
            lines.forEach((l, i) => {
              const d = JSON.parse(l);
              if (!d.id) throw new Error('line ' + i + ' missing id');
            });
            console.log('ok: ndjson contract passed, lines=' + lines.length);
          "

      - name: invalid --sort-by → stderr + non-zero exit
        run: |
          if node bin/treebuy-cli.js search products "Dyson" --sort-by invalid 2>/dev/null; then
            echo "ERROR: expected non-zero exit but got 0"
            exit 1
          fi
          echo "ok: invalid --sort-by correctly returned non-zero exit"

      - name: schema search products --output → has output_fields
        run: |
          node bin/treebuy-cli.js schema search products --output | node -e "
            const d = JSON.parse(require('fs').readFileSync(0,'utf8'));
            if (!d.output_fields || !d.output_fields['hits[]']) throw new Error('missing output_fields.hits[]');
            console.log('ok: schema --output contract passed');
          "

      - name: best-present --json → product_url uses /product/
        run: |
          node bin/treebuy-cli.js best-present "送同事禮物 500 元以內" --keywords "馬克杯,茶葉,零食禮盒" --count 1 --json | node -e "
            const d = JSON.parse(require('fs').readFileSync(0,'utf8'));
            if (!Array.isArray(d.recommendations) || d.recommendations.length === 0) throw new Error('no recommendations');
            const url = d.recommendations[0].product_url || '';
            if (!url.includes('/product/')) throw new Error('product_url must contain /product/ path');
            if (url.includes('/products/')) throw new Error('product_url must not contain /products/ path');
            console.log('ok: best-present product_url path contract passed');
          "
